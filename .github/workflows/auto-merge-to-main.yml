name: Auto Merge to Main

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      merge_all:
        description: "Merge all non-main branches to main"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # Triggered automatically when any non-main branch is pushed
  auto-merge-branch:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Processing branch: $BRANCH"

          # Create a PR targeting main (no-op if it already exists)
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Merge $BRANCH into main" \
            --body "Automatically merging branch \`$BRANCH\` into \`main\`." \
            || echo "PR already exists or could not be created — continuing"

          # Find the open PR for this branch
          PR_NUMBER=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$PR_NUMBER" ]; then
            echo "Enabling auto-merge (rebase) for PR #$PR_NUMBER"
            gh pr merge "$PR_NUMBER" --auto --rebase \
              || echo "Auto-merge could not be enabled for PR #$PR_NUMBER"
          else
            echo "No open PR found for branch $BRANCH — skipping auto-merge"
          fi

  # Triggered manually via workflow_dispatch to merge every non-main branch at once
  merge-all-branches:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge all non-main branches to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # List all remote branches except main, one per line
          gh api "repos/${{ github.repository }}/branches" \
            --jq '.[].name | select(. != "main")' > /tmp/branches.txt

          if [ ! -s /tmp/branches.txt ]; then
            echo "No non-main branches found — nothing to merge"
            exit 0
          fi

          while IFS= read -r BRANCH; do
            echo "--- Processing branch: $BRANCH ---"

            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Merge $BRANCH into main" \
              --body "Automatically merging branch \`$BRANCH\` into \`main\`." \
              || echo "PR already exists for $BRANCH — continuing"

            PR_NUMBER=$(gh pr list \
              --head "$BRANCH" \
              --base main \
              --state open \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$PR_NUMBER" ]; then
              echo "Enabling auto-merge (rebase) for PR #$PR_NUMBER"
              gh pr merge "$PR_NUMBER" --auto --rebase \
                || echo "Auto-merge could not be enabled for PR #$PR_NUMBER"
            else
              echo "No open PR found for $BRANCH — skipping"
            fi
          done < /tmp/branches.txt
